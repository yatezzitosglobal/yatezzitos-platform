name: Auto-assign Copilot to AI Tasks

on:
  issues:
    types: [opened, labeled]

jobs:
  assign-copilot:
    # Solo ejecutar cuando el issue tenga el label ai-task
    if: contains(github.event.issue.labels.*.name, 'ai-task')
    runs-on: ubuntu-latest
    steps:
      - name: Assign Issue to Copilot
        uses: otto-de/assign_issue_toCopilot_action@v1.0.1
        with:
          issue_number: ${{ github.event.issue.number }}
          github_token: ${{ secrets.COPILOT_PAT }}
