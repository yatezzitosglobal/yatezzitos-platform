name: Auto-assign Copilot to AI Tasks

on:
  issues:
    types: [opened, labeled]

jobs:
  assign-copilot:
    # Solo ejecutar cuando el issue tenga ambos labels
    if: |
      contains(github.event.issue.labels.*.name, 'ai-task') &&
      contains(github.event.issue.labels.*.name, 'from-whatsapp')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Assign Copilot to Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`🤖 Attempting to assign Copilot to issue #${issueNumber}`);
            
            try {
              // Intentar asignar via la API de Copilot coding agent
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner,
                repo,
                issue_number: issueNumber,
                assignees: ['copilot-swe-agent'],
                headers: {
                  'X-GitHub-Api-Version': '2022-11-28'
                }
              });
              console.log(`✅ Copilot assigned to issue #${issueNumber}`);
            } catch (error) {
              console.log(`⚠️ Direct assignment failed: ${error.message}`);
              console.log('Trying alternative assignment method...');
              
              try {
                // Método alternativo: usar el endpoint de Copilot tasks
                await github.request('POST /repos/{owner}/{repo}/copilot/tasks', {
                  owner,
                  repo,
                  issue_number: issueNumber,
                  headers: {
                    'X-GitHub-Api-Version': '2022-11-28'
                  }
                });
                console.log(`✅ Copilot assigned via tasks API to issue #${issueNumber}`);
              } catch (error2) {
                console.log(`⚠️ Tasks API failed: ${error2.message}`);
                
                // Método de fallback: comentar @copilot para trigger manual
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: '🤖 **Auto-asignación solicitada.** Este issue fue creado desde WhatsApp y requiere asignación al Copilot coding agent.\n\n@copilot por favor trabaja en esta tarea siguiendo las instrucciones del issue y las reglas en `.github/copilot-instructions.md`.'
                });
                console.log(`📝 Fallback comment added to issue #${issueNumber}`);
              }
            }
